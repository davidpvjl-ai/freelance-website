<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wireframes – Freelance Tech Website</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a1a; font-family: 'Space Mono', monospace; }

  /* Sketchy wireframe style */
  .wf { 
    background: #f5f0e8; 
    font-family: 'Caveat', cursive;
    color: #1a1a1a;
    position: relative;
    overflow: hidden;
  }
  .wf * { box-sizing: border-box; }

  /* Nav */
  .wf-nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 2px solid #1a1a1a;
    background: #ede8df;
  }
  .wf-logo { font-size: 14px; font-weight: 700; }
  .wf-nav-links { display: flex; gap: 12px; font-size: 11px; opacity: 0.6; }
  .wf-btn {
    background: #1a1a1a; color: #f5f0e8;
    padding: 4px 10px; border-radius: 4px; font-size: 11px;
    font-family: 'Caveat', cursive;
  }
  .wf-btn-outline {
    border: 2px solid #1a1a1a;
    padding: 4px 10px; border-radius: 4px; font-size: 11px;
    font-family: 'Caveat', cursive;
  }

  /* Generic blocks */
  .wf-box {
    background: #ddd8ce; border: 2px solid #1a1a1a;
    border-radius: 4px;
  }
  .wf-img {
    background: repeating-linear-gradient(45deg, #ccc8be, #ccc8be 4px, #ddd8ce 4px, #ddd8ce 12px);
    border: 2px solid #1a1a1a; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: #666; font-family: 'Space Mono', monospace;
  }
  .wf-accent { background: #2563eb; color: white; }
  .wf-accent-green { background: #16a34a; color: white; }
  .section-label {
    font-size: 9px; font-family: 'Space Mono', monospace;
    color: #888; text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .badge {
    display: inline-block; background: #2563eb; color: white;
    font-size: 9px; padding: 2px 6px; border-radius: 10px;
    font-family: 'Space Mono', monospace;
  }
  .badge-green { background: #16a34a; }
  .annotation {
    font-size: 9px; font-family: 'Space Mono', monospace;
    color: #e11d48; font-style: italic;
  }
  .arrow { color: #e11d48; font-size: 12px; }

  /* Card stacks */
  .card-stack { position: relative; }
  .stacked-card {
    position: absolute; border: 2px solid #1a1a1a; border-radius: 8px;
    background: #ede8df;
  }

  /* Section dividers */
  .wf-section { padding: 14px 16px; border-top: 2px dashed #bbb; }
  .wf-section:first-child { border-top: none; }

  /* Grid helpers */
  .row { display: flex; gap: 8px; }
  .col { flex: 1; }

  /* Step circles */
  .step-circle {
    width: 28px; height: 28px; border-radius: 50%;
    border: 2px solid #1a1a1a; background: #ede8df;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; flex-shrink: 0;
  }
  .step-line {
    flex: 1; height: 2px; background: #1a1a1a; align-self: center;
  }

  /* Quote */
  .wf-quote {
    border-left: 3px solid #2563eb; padding-left: 8px;
    font-size: 12px; font-style: italic; color: #444;
  }
</style>
</head>
<body>

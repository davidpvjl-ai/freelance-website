  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

mat('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n:root {\n  --bg: #f4f5fb;\n  --bg2: #eef0f9;\n  --surface: rgba(255,255,255,0.75);\n  --border: rgba(23,89,232,0.10);\n  --accent: #1759e8;\n  --accent-light: #3b6ef5;\n  --accent-glow: rgba(23,89,232,0.18);\n  --green: #16a34a;\n  --text: #0d0f1e;\n  --muted: #5a5d7a;\n  --card-r: 14px;\n  --font-head: 'Space Grotesk', sans-serif;\n  --font-body: 'DM Sans', sans-serif;\n}\n*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}\nhtml{scroll-behavior:smooth}\nbody{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:16px;line-height:1.6;overflow-x:hidden}\n\n/* LIQUID MESH BLOBS — GPU smooth */\n#mesh-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}\n.blob{position:absolute;border-radius:50%;filter:blur(90px);will-change:transform}\n.blob-1{width:620px;height:620px;background:rgba(23,89,232,0.14);top:-160px;left:-160px;animation:bfloat1 20s ease-in-out infinite alternate}\n.blob-2{width:500px;height:500px;background:rgba(139,92,246,0.11);top:15%;right:-120px;animation:bfloat2 26s ease-in-out infinite alternate}\n.blob-3{width:560px;height:560px;background:rgba(56,152,236,0.10);bottom:-140px;left:25%;animation:bfloat3 22s ease-in-out infinite alternate}\n.blob-4{width:380px;height:380px;background:rgba(23,89,232,0.08);top:45%;left:5%;animation:bfloat4 30s ease-in-out infinite alternate}\n@keyframes bfloat1{from{transform:translate(0,0) scale(1)}to{transform:translate(80px,60px) scale(1.12)}}\n@keyframes bfloat2{from{transform:translate(0,0) scale(1)}to{transform:translate(-70px,80px) scale(0.92)}}\n@keyframes bfloat3{from{transform:translate(0,0) scale(1)}to{transform:translate(50px,-70px) scale(1.08)}}\n@keyframes bfloat4{from{transform:translate(0,0) scale(1)}to{transform:translate(60px,50px) scale(1.15)}}\nbody::after{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(23,89,232,0.055) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;z-index:0}\nsection,nav,footer{position:relative;z-index:1}\n\n/* NAV */\nnav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 5%;height:64px;background:rgba(244,245,251,0.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);box-shadow:0 1px 16px rgba(23,89,232,0.07)}\n.nav-logo{font-family:var(--font-head);font-weight:800;font-size:18px;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:8px}\n.nav-logo span{width:8px;height:8px;background:var(--accent);border-radius:50%;display:inline-block;box-shadow:0 0 8px var(--accent)}\n.nav-links{display:flex;gap:28px;list-style:none}\n.nav-links a{color:var(--muted);text-decoration:none;font-size:14px;transition:color .2s}\n.nav-links a:hover{color:var(--text)}\n.nav-cta{background:var(--accent);color:#fff;padding:8px 18px;border-radius:6px;font-size:14px;font-weight:500;text-decoration:none;transition:background .2s,transform .15s,box-shadow .2s}\n.nav-cta:hover{background:#1d4ed8;transform:translateY(-1px);box-shadow:0 4px 20px var(--accent-glow)}\n.nav-mobile-btn{display:none;background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;padding:6px 10px;border-radius:6px;transition:background .15s}\n.nav-mobile-btn:hover{background:rgba(23,89,232,0.08)}\n\n/* MOBILE MENU OVERLAY */\n#mobileMenu{position:fixed;inset:0;z-index:200;pointer-events:none}\n#mobileMenu .mm-backdrop{position:absolute;inset:0;background:rgba(13,15,30,0.45);opacity:0;transition:opacity .25s ease;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}\n#mobileMenu .mm-panel{position:absolute;top:0;right:0;height:100%;width:min(86%,360px);background:rgba(248,249,253,0.98);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:-12px 0 40px rgba(13,15,30,0.18);transform:translateX(100%);transition:transform .32s cubic-bezier(.55,.1,.25,1);display:flex;flex-direction:column;padding:18px 22px 28px}\n#mobileMenu.open{pointer-events:auto}\n#mobileMenu.open .mm-backdrop{opacity:1}\n#mobileMenu.open .mm-panel{transform:none}\n#mobileMenu .mm-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;padding-bottom:14px;border-bottom:1px solid var(--border)}\n#mobileMenu .mm-logo{font-family:var(--font-head);font-weight:800;font-size:16px;color:var(--text);display:flex;align-items:center;gap:8px}\n#mobileMenu .mm-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent)}\n#mobileMenu .mm-close{background:rgba(23,89,232,0.06);border:1px solid var(--border);width:34px;height:34px;border-radius:50%;font-size:24px;line-height:1;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--font-head);transition:all .15s}\n#mobileMenu .mm-close:hover{background:rgba(23,89,232,0.14);transform:rotate(90deg)}\n#mobileMenu .mm-links{list-style:none;display:flex;flex-direction:column;gap:2px;margin:0 -8px}\n#mobileMenu .mm-links a{display:block;padding:14px 12px;color:var(--text);text-decoration:none;font-size:18px;font-family:var(--font-head);font-weight:500;border-radius:8px;transition:background .15s,color .15s}\n#mobileMenu .mm-links a:hover{background:rgba(23,89,232,0.06);color:var(--accent)}\n#mobileMenu .mm-links a.active{color:var(--accent);background:rgba(23,89,232,0.08);font-weight:600}\n#mobileMenu .mm-cta-wrap{margin-top:auto;padding-top:24px}\n#mobileMenu .mm-cta{display:flex;align-items:center;justify-content:center;gap:6px;background:var(--accent);color:#fff;padding:14px 18px;border-radius:10px;font-size:15px;font-weight:500;text-decoration:none;transition:background .2s,transform .15s}\n#mobileMenu .mm-cta:hover{background:#1d4ed8;transform:translateY(-1px)}\n\n/* HERO */\n.hero{min-height:calc(100vh - 64px);display:flex;align-items:center;padding:80px 5% 60px;gap:60px}\n.hero-left{flex:1;max-width:560px}\n.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(37,99,235,0.12);border:1px solid rgba(37,99,235,0.3);border-radius:20px;padding:5px 14px;font-size:12px;color:var(--accent-light);margin-bottom:24px}\n.hero-badge::before{content:'';width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}\n@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}\nh1{font-family:var(--font-head);font-weight:800;font-size:clamp(36px,5vw,62px);line-height:1.08;letter-spacing:-1.5px;margin-bottom:20px}\nh1 em{font-style:normal;color:var(--accent-light)}\n.hero-sub{font-size:17px;color:var(--muted);max-width:420px;margin-bottom:36px;line-height:1.7}\n.btn-row{display:flex;gap:12px;flex-wrap:wrap}\n.btn-primary{background:var(--accent);color:#fff;padding:13px 24px;border-radius:8px;font-size:15px;font-weight:500;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:all .2s}\n.btn-primary:hover{background:#1d4ed8;transform:translateY(-2px);box-shadow:0 8px 30px var(--accent-glow)}\n.btn-ghost{color:var(--text);padding:13px 24px;border-radius:8px;font-size:15px;text-decoration:none;border:1px solid var(--border);display:inline-flex;align-items:center;gap:8px;transition:all .2s}\n.btn-ghost:hover{border-color:rgba(255,255,255,0.2);background:var(--surface)}\n.hero-stats{display:flex;gap:32px;margin-top:48px;padding-top:32px;border-top:1px solid var(--border)}\n.stat-num{font-family:var(--font-head);font-weight:800;font-size:17px;color:var(--text);display:block;letter-spacing:-0.3px;line-height:1.2}\n.stat-lbl{font-size:12px;color:var(--muted)}\n\n/* CARD STACK */\n.hero-right{flex:0 0 476px;position:relative;height:448px}\n.project-cards{position:relative;width:420px;height:380px;margin:0 auto}\n.p-card{position:absolute;width:390px;background:rgba(255,255,255,0.95);border:1px solid var(--border);border-radius:var(--card-r);padding:24px;cursor:grab;user-select:none;touch-action:pan-y;transition:transform .5s cubic-bezier(.34,1.4,.64,1),box-shadow .4s,opacity .4s;backdrop-filter:blur(10px);box-shadow:0 4px 24px rgba(23,89,232,0.09)}\n.p-card:nth-child(1){top:0;left:0;z-index:3;transform:rotate(0deg)}\n.p-card:nth-child(2){top:16px;left:16px;z-index:2;transform:rotate(4deg)}\n.p-card:nth-child(3){top:32px;left:32px;z-index:1;transform:rotate(8deg)}\n.p-card.active{border-color:rgba(23,89,232,0.4);box-shadow:0 8px 40px rgba(23,89,232,0.18)}\n.card-tag{font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}\n.card-img{height:140px;background:rgba(23,89,232,0.05);border-radius:8px;margin-bottom:14px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:11px;font-family:monospace;overflow:hidden;position:relative}\n.card-img-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}\n.card-title{font-family:var(--font-head);font-weight:700;font-size:15px;margin-bottom:6px}\n.card-result{display:inline-flex;align-items:center;gap:5px;background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.2);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--green);font-weight:500}\n.card-dots{display:flex;gap:6px;justify-content:center;margin-top:16px;position:absolute;bottom:-32px;left:50%;transform:translateX(-50%)}\n.card-dot{width:6px;height:6px;border-radius:50%;background:rgba(23,89,232,0.2);cursor:pointer;transition:background .2s}\n.card-dot.active{background:var(--accent)}\n\n/* SECTION COMMONS */\nsection{padding:90px 5%}\n.section-eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--accent-light);margin-bottom:12px;font-weight:500}\nh2{font-family:var(--font-head);font-weight:800;font-size:clamp(28px,3.5vw,44px);letter-spacing:-1px;line-height:1.1;margin-bottom:16px}\n.section-sub{color:var(--muted);font-size:17px;max-width:500px;line-height:1.7;margin-bottom:56px}\n\n/* FADE-IN ANIMATION */\n.reveal{opacity:0;transform:translateY(28px);transition:opacity .6s ease,transform .6s ease}\n.reveal.visible{opacity:1;transform:none}\n.reveal-delay-1{transition-delay:.1s}\n.reveal-delay-2{transition-delay:.2s}\n.reveal-delay-3{transition-delay:.3s}\n\n/* SERVICES */\n.services-bg{background:transparent}\n.services-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}\n.svc-card{background:rgba(255,255,255,0.88);border:1px solid var(--border);border-radius:var(--card-r);padding:28px;transition:border-color .3s,transform .3s,box-shadow .3s;position:relative;overflow:hidden;box-shadow:0 2px 16px rgba(23,89,232,0.06)}\n.svc-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(37,99,235,0.06),transparent);opacity:0;transition:opacity .3s}\n.svc-card:hover{border-color:rgba(23,89,232,0.4);transform:translateY(-4px);box-shadow:0 16px 40px rgba(23,89,232,0.14)}\n.svc-card:hover::before{opacity:1}\n.svc-icon{width:44px;height:44px;background:rgba(37,99,235,0.15);border:1px solid rgba(37,99,235,0.25);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:18px}\n.svc-title{font-family:var(--font-head);font-weight:700;font-size:18px;margin-bottom:8px}\n.svc-desc{color:var(--muted);font-size:14px;line-height:1.7;margin-bottom:16px}\n.svc-benefits{list-style:none;display:flex;flex-direction:column;gap:6px}\n.svc-benefits li{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:6px}\n.svc-benefits li::before{content:'✓';color:var(--green);font-weight:700;font-size:12px;flex-shrink:0}\n\n/* PORTFOLIO */\n.portfolio-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}\n.proj-card{background:rgba(255,255,255,0.92);border:1px solid var(--border);border-radius:var(--card-r);ov eal-delay-1\"><div class=\"step-num\">02<\u002Fdiv><div><div class=\"step-title\">Design<\u002Fdiv><p class=\"step-desc\">Ontwerp en copy op maat, iteratief.<\u002Fp><\u002Fdiv><\u002Fdiv>\n    <div class=\"step reveal reveal-delay-2\"><div class=\"step-num\">03<\u002Fdiv><div><div class=\"step-title\">Bouwen<\u002Fdiv><p class=\"step-desc\">Snelle, schone code. Jij ziet de voortgang.<\u002Fp><\u002Fdiv><\u002Fdiv>\n    <div class=\"step reveal reveal-delay-3\"><div class=\"step-num\">04<\u002Fdiv><div><div class=\"step-title\">Livegang<\u002Fdiv><p class=\"step-desc\">Livegang + training zodat jij het zelf kunt beheren.<\u002Fp><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section style=\"text-align:center\">\n  <h2 class=\"reveal\">Klaar voor een nieuwe website?<\u002Fh2>\n  <p class=\"section-sub reveal reveal-delay-1\" style=\"margin:0 auto 32px\">Plan een gratis gesprek — we bespreken jouw doelen en ik maak direct een voorstel.<\u002Fp>\n  <a href=\"index.html#contact\" class=\"btn-primary reveal reveal-delay-2\">Gratis gesprek inplannen →<\u002Fa>\n<\u002Fsection>\n\n<footer>\n  <a href=\"index.html\" class=\"nav-logo\"><span><\u002Fspan>David Spijker<\u002Fa>\n  <div class=\"footer-links\">\n    <a href=\"websites.html\">Websites<\u002Fa>\n    <a href=\"automatisering.html\">Automatisering<\u002Fa>\n    <a href=\"projecten.html\">Projecten<\u002Fa>\n    <a href=\"index.html#contact\">Contact<\u002Fa>\n  <\u002Fdiv>\n  <div class=\"footer-copy\">© 2026 David Spijker<\u002Fdiv>\n<\u002Ffooter>\n<script>\nconst observer = new IntersectionObserver((entries) => {\n  entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });\n}, {threshold: 0.1, rootMargin: '0px 0px -40px 0px'});\ndocument.querySelectorAll('.reveal').forEach(el => observer.observe(el));\nwindow.addEventListener('scroll', () => {\n  document.querySelector('nav').style.borderBottomColor = window.scrollY > 20 ? 'rgba(23,89,232,0.08)' : 'rgba(23,89,232,0.10)';\n});\n<\u002Fscript>\n<script src=\"694df2ef-a9e5-426e-90e3-02acabbe4ea0\"><\u002Fscript>\n\n<\u002Fbody><\u002Fhtml>"

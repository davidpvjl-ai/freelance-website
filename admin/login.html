<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Inloggen — David Spijker Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css">
</head>
<body>
<a href="../index.html" class="login-back">← Terug naar website</a>
<div class="login-wrap">
  <div class="login-bg"></div>
  <div class="login-card">
    <div class="login-logo"><span class="login-logo-dot"></span><span class="login-logo-text">David Spijker</span></div>
    <div class="login-title">Welkom terug</div>
    <div class="login-sub">Log in op je admin dashboard</div>

    <div class="login-error" id="err">Ongeldige inloggegevens</div>

    <button class="login-google" onclick="googleLogin()">
      <svg width="17" height="17" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Inloggen met Google
    </button>

    <div class="login-divider">of met wachtwoord</div>

    <form onsubmit="return pwLogin(event)">
      <input type="email" class="login-input" id="email" placeholder="E-mailadres" value="david.pvjl@gmail.com" autocomplete="email">
      <input type="password" class="login-input" id="pw" placeholder="Wachtwoord" autocomplete="current-password" required>
      <button type="submit" class="login-submit">Inloggen →</button>
    </form>

    <div class="login-hint">
      Demo: wachtwoord <code>admin</code> of klik Google<br>
      <span style="color:var(--a-muted);font-size:10.5px">Op productie: server-side Google OAuth + whitelist voor david.pvjl@gmail.com</span>
    </div>
  </div>
</div>

<script src="admin.js"></script>
<script>
if(localStorage.getItem('ds_auth')==='1'){ location.href='dashboard.html'; }
const ALLOWED_EMAIL = 'david.pvjl@gmail.com';

function doLogin(){
  localStorage.setItem('ds_auth','1');
  location.href = 'dashboard.html';
}
function googleLogin(){
  // MOCK: in productie server-side OAuth + e-mail whitelist check
  setTimeout(doLogin, 300);
}
function pwLogin(e){
  e.preventDefault();
  const email = document.getElementById('email').value.trim().toLowerCase();
  const pw = document.getElementById('pw').value;
  const err = document.getElementById('err');
  if(email !== ALLOWED_EMAIL || pw !== 'admin'){
    err.classList.add('show');
    err.textContent = email !== ALLOWED_EMAIL ? 'Deze e-mail heeft geen toegang' : 'Onjuist wachtwoord';
    return false;
  }
  err.classList.remove('show');
  doLogin();
  return false;
}
</script>
</body>
</html>
